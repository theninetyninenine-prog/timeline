<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Editable Timeline</title>
</head>
<body>
    <h1>Editable Timeline</h1>
    
    <div class="zoom-info">
        <p>Use your mouse wheel or trackpad to zoom in/out</p>
    </div>
    
    <div id="timeline" class="timeline-line">
        <!-- Timeline events will be rendered here -->
    </div>
    
    <button id="addEventBtn" class="add-event-btn">+ Add Event</button>

    <div id="eventModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Add/Edit Event</h2>
            <form id="eventForm">
                <label for="eventTitle">Event Title:</label>
                <input type="text" id="eventTitle" name="eventTitle" required>
                
                <label for="eventDate">Event Date:</label>
                <input type="date" id="eventDate" name="eventDate" required>
                
                <label for="eventDescription">Event Description:</label>
                <textarea id="eventDescription" name="eventDescription" rows="4" required></textarea>
                
                <label for="eventImportance">Event Importance:</label>
                <select id="eventImportance" name="eventImportance" required>
                    <option value="">Select Importance</option>
                    <option value="key">Key</option>
                    <option value="major">Major</option>
                    <option value="all">All</option>
                </select>
                
                <button type="submit">Save Event</button>
            </form>
        </div>
    </div>

    <script src="timeline.js"></script>
</body>
</html>
