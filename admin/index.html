<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Timeline Editing Interface</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .timeline { position: relative; padding: 10px; }
        .timeline-item { margin: 20px 0; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .timeline-item .date { font-weight: bold; }
        .timeline-item .content { margin-top: 5px; }
        .btn { padding: 5px 10px; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Interactive Timeline Editing Interface</h1>
    <div class="timeline" id="timeline">
        <div class="timeline-item">
            <div class="date">2026-03-18</div>
            <div class="content">Sample Event Content</div>
        </div>
        <!-- More timeline items can be added here -->
    </div>
    <button class="btn" onclick="addTimelineItem()">Add Event</button>
    <script>
        function addTimelineItem() {
            const date = prompt('Enter Event Date (YYYY-MM-DD):');
            const content = prompt('Enter Event Content:');
            if (date && content) {
                const timeline = document.getElementById('timeline');
                const item = document.createElement('div');
                item.classList.add('timeline-item');
                item.innerHTML = `<div class=\"date\">${date}</div><div class=\"content\">${content}</div>`;
                timeline.appendChild(item);
            }
        }
    </script>
</body>
</html>
